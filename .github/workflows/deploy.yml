# ─── CI/CD Pipeline ──────────────────────────────────
name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY_SERVER: acr-server
  ECR_REPOSITORY_WEB: acr-web
  ECS_CLUSTER: ai-code-review
  ECS_SERVICE_SERVER: acr-server-service
  ECS_SERVICE_WEB: acr-web-service

jobs:
  # ─── Lint & Type Check ────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  # ─── Test ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:test_password@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret-key-for-ci
      JWT_REFRESH_SECRET: test-refresh-secret-for-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:push --workspace=server
      - run: npm run test --workspace=server

  # ─── Build & Push Docker Images ───────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      server_image: ${{ steps.meta.outputs.tags }}
      web_image: ${{ steps.meta-web.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure nhà cung cấp dịch vụ AI credentials
        uses: nhà cung cấp dịch vụ AI-actions/configure-nhà cung cấp dịch vụ AI-credentials@v4
        with:
          nhà cung cấp dịch vụ AI-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          nhà cung cấp dịch vụ AI-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          nhà cung cấp dịch vụ AI-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: nhà cung cấp dịch vụ AI-actions/amazon-ecr-login@v2

      # ─── Build Server Image ──────────────────────
      - name: Docker metadata (Server)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_SERVER }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── Build Web Image ─────────────────────────
      - name: Docker metadata (Web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_WEB }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to ECS ───────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Configure nhà cung cấp dịch vụ AI credentials
        uses: nhà cung cấp dịch vụ AI-actions/configure-nhà cung cấp dịch vụ AI-credentials@v4
        with:
          nhà cung cấp dịch vụ AI-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          nhà cung cấp dịch vụ AI-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          nhà cung cấp dịch vụ AI-region: ${{ env.AWS_REGION }}

      - name: Deploy Server to ECS
        uses: nhà cung cấp dịch vụ AI-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ecs/server-task-def.json
          service: ${{ env.ECS_SERVICE_SERVER }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deploy Web to ECS
        uses: nhà cung cấp dịch vụ AI-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ecs/web-task-def.json
          service: ${{ env.ECS_SERVICE_WEB }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
