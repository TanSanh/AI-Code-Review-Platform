# ─── Production Docker Compose ──────────────────────
# Usage: docker compose -f docker-compose.production.yml up -d

services:
  # ─── PostgreSQL Database ──────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: acr-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_code_review}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - acr-network

  # ─── Redis Cache ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: acr-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - acr-network

  # ─── Backend API (NestJS) ─────────────────────────
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: acr-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - acr-network

  # ─── Frontend (Next.js) ───────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: acr-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_WS_URL=ws://localhost:3001
    depends_on:
      - server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - acr-network

  # ─── Nginx Reverse Proxy ──────────────────────────
  nginx:
    image: nginx:alpine
    container_name: acr-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - web
      - server
    networks:
      - acr-network

  # ─── Certbot (Let's Encrypt SSL) ─────────────────
  certbot:
    image: certbot/certbot
    container_name: acr-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_conf:

networks:
  acr-network:
    driver: bridge
